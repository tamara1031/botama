services:
  bot:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      MODULES_ENABLED: ${MODULES_ENABLED:-ping,notify}
      GUILD_ID: ${GUILD_ID:-}
      NOTIFY_INFO_CHANNEL_ID: ${NOTIFY_INFO_CHANNEL_ID:-}
      NOTIFY_WARNING_CHANNEL_ID: ${NOTIFY_WARNING_CHANNEL_ID:-}
      NOTIFY_CRITICAL_CHANNEL_ID: ${NOTIFY_CRITICAL_CHANNEL_ID:-}
      API_TOKEN: ${API_TOKEN:-}
      API_ADDR: ${API_ADDR:-:8080}
    ports:
      - "8080:8080"
    restart: unless-stopped
